<div id="asset-note-{{ asset.part_uid }}">
    <label class="form-label small text-body-secondary mb-1">Notes</label>
    <textarea name="notes" class="form-control form-control-sm" rows="3"
              hx-post="/partials/asset/{{ asset.part_uid }}/note"
              hx-trigger="blur"
              hx-target="#asset-note-{{ asset.part_uid }}"
              hx-swap="outerHTML">{{ asset.notes or '' }}</textarea>
</div>
